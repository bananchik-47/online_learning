services:
  postgres:
    image: postgres:16-alpine
    container_name: online-learning-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-online_learning}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-online_learning}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - online-learning-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: online-learning-app
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-online_learning}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      SERVER_PORT: 8080
      APP_UPLOAD_DIR: /app/uploads
      SPRING_THYMELEAF_CACHE: "true"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - online-learning-network

volumes:
  postgres_data:
  uploads_data:

networks:
  online-learning-network:
    driver: bridge
