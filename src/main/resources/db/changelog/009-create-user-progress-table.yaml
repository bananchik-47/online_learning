databaseChangeLog:
  - changeSet:
      id: 009
      author: student

      changes:
        - createTable:
            tableName: user_progress
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: lesson_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: completed
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

              - column:
                  name: completed_at
                  type: TIMESTAMP

              - column:
                  name: created_at
                  type: TIMESTAMP

              - column:
                  name: updated_at
                  type: TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: user_progress
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_progress_user
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: user_progress
            baseColumnNames: lesson_id
            referencedTableName: lessons
            referencedColumnNames: id
            constraintName: fk_user_progress_lesson
            onDelete: CASCADE

        - addUniqueConstraint:
            tableName: user_progress
            constraintName: uq_user_progress_user_lesson
            columnNames: user_id, lesson_id

        - createIndex:
            indexName: idx_user_progress_user_id
            tableName: user_progress
            columns:
              - column:
                  name: user_id

        - createIndex:
            indexName: idx_user_progress_lesson_id
            tableName: user_progress
            columns:
              - column:
                  name: lesson_id
