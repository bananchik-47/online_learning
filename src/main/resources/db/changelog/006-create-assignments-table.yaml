databaseChangeLog:
  - changeSet:
      id: 006
      author: student

      changes:
        - createTable:
            tableName: assignments
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: lesson_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: TEXT

              - column:
                  name: max_score
                  type: INTEGER
                  defaultValueNumeric: 100
                  constraints:
                    nullable: false

              - column:
                  name: due_date
                  type: TIMESTAMP

              - column:
                  name: created_at
                  type: TIMESTAMP

              - column:
                  name: updated_at
                  type: TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: assignments
            baseColumnNames: lesson_id
            referencedTableName: lessons
            referencedColumnNames: id
            constraintName: fk_assignments_lesson
            onDelete: CASCADE

        - createIndex:
            indexName: idx_assignments_lesson_id
            tableName: assignments
            columns:
              - column:
                  name: lesson_id

        - createIndex:
            indexName: idx_assignments_due_date
            tableName: assignments
            columns:
              - column:
                  name: due_date
