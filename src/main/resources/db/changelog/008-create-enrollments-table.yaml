databaseChangeLog:
  - changeSet:
      id: 008
      author: student

      changes:
        - createTable:
            tableName: enrollments
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: course_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(30)
                  defaultValue: ACTIVE
                  constraints:
                    nullable: false

              - column:
                  name: enrolled_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: completed_at
                  type: TIMESTAMP

              - column:
                  name: created_at
                  type: TIMESTAMP

              - column:
                  name: updated_at
                  type: TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: enrollments
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_enrollments_user
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: enrollments
            baseColumnNames: course_id
            referencedTableName: courses
            referencedColumnNames: id
            constraintName: fk_enrollments_course
            onDelete: CASCADE

        - addUniqueConstraint:
            tableName: enrollments
            constraintName: uq_enrollments_user_course
            columnNames: user_id, course_id

        - createIndex:
            indexName: idx_enrollments_user_id
            tableName: enrollments
            columns:
              - column:
                  name: user_id

        - createIndex:
            indexName: idx_enrollments_course_id
            tableName: enrollments
            columns:
              - column:
                  name: course_id

        - createIndex:
            indexName: idx_enrollments_status
            tableName: enrollments
            columns:
              - column:
                  name: status
