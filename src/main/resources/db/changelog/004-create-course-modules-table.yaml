databaseChangeLog:
  - changeSet:
      id: 004
      author: student

      changes:
        - createTable:
            tableName: course_modules
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: course_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: TEXT

              - column:
                  name: order_index
                  type: INTEGER
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP

              - column:
                  name: updated_at
                  type: TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: course_modules
            baseColumnNames: course_id
            referencedTableName: courses
            referencedColumnNames: id
            constraintName: fk_course_modules_course
            onDelete: CASCADE

        - addUniqueConstraint:
            tableName: course_modules
            constraintName: uq_course_modules_course_order
            columnNames: course_id, order_index

        - createIndex:
            indexName: idx_course_modules_course_id
            tableName: course_modules
            columns:
              - column:
                  name: course_id
