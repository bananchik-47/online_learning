databaseChangeLog:
  - changeSet:
      id: 007
      author: student

      changes:
        - createTable:
            tableName: submissions
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: assignment_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: student_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: content
                  type: TEXT

              - column:
                  name: score
                  type: INTEGER

              - column:
                  name: feedback
                  type: TEXT

              - column:
                  name: status
                  type: VARCHAR(30)
                  defaultValue: SUBMITTED
                  constraints:
                    nullable: false

              - column:
                  name: submitted_at
                  type: TIMESTAMP

              - column:
                  name: graded_at
                  type: TIMESTAMP

              - column:
                  name: created_at
                  type: TIMESTAMP

              - column:
                  name: updated_at
                  type: TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: submissions
            baseColumnNames: assignment_id
            referencedTableName: assignments
            referencedColumnNames: id
            constraintName: fk_submissions_assignment
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: submissions
            baseColumnNames: student_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_submissions_student
            onDelete: RESTRICT

        - addUniqueConstraint:
            tableName: submissions
            constraintName: uq_submissions_assignment_student
            columnNames: assignment_id, student_id

        - createIndex:
            indexName: idx_submissions_assignment_id
            tableName: submissions
            columns:
              - column:
                  name: assignment_id

        - createIndex:
            indexName: idx_submissions_student_id
            tableName: submissions
            columns:
              - column:
                  name: student_id

        - createIndex:
            indexName: idx_submissions_status
            tableName: submissions
            columns:
              - column:
                  name: status
