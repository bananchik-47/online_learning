databaseChangeLog:
  - changeSet:
      id: 003
      author: student

      changes:
        - createTable:
            tableName: courses
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: TEXT

              - column:
                  name: instructor_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: is_published
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP

              - column:
                  name: updated_at
                  type: TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: courses
            baseColumnNames: instructor_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_courses_instructor
            onDelete: RESTRICT

        - createIndex:
            indexName: idx_courses_instructor_id
            tableName: courses
            columns:
              - column:
                  name: instructor_id

        - createIndex:
            indexName: idx_courses_is_published
            tableName: courses
            columns:
              - column:
                  name: is_published

        - createIndex:
            indexName: idx_courses_created_at
            tableName: courses
            columns:
              - column:
                  name: created_at
