<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout-admin}">
<head>
    <title>Admin — New user</title>
</head>
<body>
<div layout:fragment="admin-content">
    <h1 class="h3 mb-4">
        <i class="bi bi-person-plus me-2"></i>New user
    </h1>

    <th:block th:replace="~{fragments/admin-form-card :: open}"></th:block>
    <form th:action="@{/app/admin/users}" th:object="${registerRequest}" method="post" novalidate>
        <div class="row">
            <div class="col-md-6">
                <div th:replace="~{fragments/form-controls :: field('firstName', 'First name', 'text', false)}"></div>
            </div>
            <div class="col-md-6">
                <div th:replace="~{fragments/form-controls :: field('lastName', 'Last name', 'text', false)}"></div>
            </div>
        </div>
        <div th:replace="~{fragments/form-controls :: field('username', 'Username', 'text', true)}"></div>
        <div th:replace="~{fragments/form-controls :: field('email', 'Email', 'email', true)}"></div>
        <div th:replace="~{fragments/form-controls :: field('password', 'Password', 'password', true)}"></div>
        <div class="form-text mb-3">At least 6 characters. User will be registered as STUDENT.</div>
        <div th:replace="~{fragments/form-controls :: actions('Create', @{/app/admin/users})}"></div>
    </form>
    <th:block th:replace="~{fragments/admin-form-card :: close}"></th:block>
</div>
</body>
</html>
