<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout-admin}">
<head>
    <title>Admin — Users</title>
</head>
<body>
<div layout:fragment="admin-content">
    <div th:replace="~{fragments/admin-page-header :: header('Users', 'bi bi-people', @{/app/admin/users/new}, 'New user')}"></div>

    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Name</th>
                <th>Role</th>
                <th>Enabled</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${users.isEmpty()}">
                <td colspan="7" class="text-center text-muted py-4">No users yet.</td>
            </tr>
            <tr th:each="user : ${users.content}">
                <td th:text="${user.id}">1</td>
                <td th:text="${user.username}">username</td>
                <td th:text="${user.email}">email</td>
                <td th:text="${#strings.trim((user.firstName ?: '') + ' ' + (user.lastName ?: ''))}">Name</td>
                <td><span class="badge text-bg-info" th:text="${user.role}">ROLE</span></td>
                <td>
                    <span th:if="${user.enabled}" class="badge text-bg-success">Yes</span>
                    <span th:unless="${user.enabled}" class="badge text-bg-secondary">No</span>
                </td>
                <td class="text-end">
                    <a th:href="@{/app/admin/users/{id}(id=${user.id})}" class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-eye"></i><span class="d-none d-md-inline ms-1">View</span>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{fragments/pagination :: pagination(${users})}"></div>
</div>
</body>
</html>
