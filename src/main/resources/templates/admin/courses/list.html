<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout-admin}">
<head>
    <title>Admin — Courses</title>
</head>
<body>
<div layout:fragment="admin-content">
    <div th:replace="~{fragments/admin-page-header :: header('Courses', 'bi bi-journal-bookmark', @{/app/admin/courses/new}, 'New course')}"></div>

    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Published</th>
                <th>Created</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${courses.isEmpty()}">
                <td colspan="5" class="text-center text-muted py-4">No courses yet.</td>
            </tr>
            <tr th:each="course : ${courses}">
                <td th:text="${course.id}">1</td>
                <td th:text="${course.title}">Title</td>
                <td>
                    <span th:if="${course.isPublished}" class="badge text-bg-success">Yes</span>
                    <span th:unless="${course.isPublished}" class="badge text-bg-secondary">No</span>
                </td>
                <td th:text="${course.createdAt != null ? #temporals.format(course.createdAt, 'dd.MM.yyyy') : '-'}">-</td>
                <td class="text-end text-nowrap">
                    <a th:href="@{/app/admin/courses/{id}/modules(id=${course.id})}"
                       class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-collection"></i><span class="d-none d-md-inline ms-1">Modules</span>
                    </a>
                    <a th:href="@{/app/admin/courses/{id}/edit(id=${course.id})}"
                       class="btn btn-sm btn-outline-secondary" aria-label="Edit">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <th:block th:replace="~{fragments/delete-form :: delete(@{/app/admin/courses/{id}/delete(id=${course.id})}, 'Delete this course?')}"></th:block>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
