<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}">
<head>
    <title>Home</title>
</head>
<body>
<div layout:fragment="content">
    <section class="text-center py-5 mb-4 bg-light rounded-3">
        <div class="container py-4">
            <h1 class="display-5 fw-bold">
                <i class="bi bi-mortarboard text-primary me-2"></i>Online Learning Platform
            </h1>
            <p class="lead text-muted col-lg-8 mx-auto">
                Explore courses, study at your own pace, and track your progress.
            </p>
            <div class="d-flex justify-content-center gap-2 mt-4" sec:authorize="isAnonymous()">
                <a th:href="@{/register}" class="btn btn-primary btn-lg">
                    <i class="bi bi-person-plus me-1"></i>Get started
                </a>
                <a th:href="@{/login}" class="btn btn-outline-primary btn-lg">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Sign in
                </a>
            </div>
            <div sec:authorize="isAuthenticated()">
                <a th:href="@{/app/courses}" class="btn btn-primary btn-lg">
                    <i class="bi bi-journal-richtext me-1"></i>Browse courses
                </a>
            </div>
        </div>
    </section>

    <section sec:authorize="isAuthenticated()" th:if="${featuredCourses != null and !featuredCourses.isEmpty()}">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h4 mb-0">Featured courses</h2>
            <a th:href="@{/app/courses}" class="btn btn-sm btn-outline-primary">View all</a>
        </div>

        <div class="row g-4">
            <div class="col-md-4" th:each="course : ${featuredCourses.content}">
                <div class="card h-100 shadow-sm">
                    <div class="card-body d-flex flex-column">
                        <h3 class="h5 card-title" th:text="${course.title}">Course title</h3>
                        <p class="card-text text-muted flex-grow-1"
                           th:text="${#strings.abbreviate(course.description, 120)}">Description</p>
                        <div class="d-flex justify-content-between align-items-center mt-2">
                            <small class="text-muted">
                                <i class="bi bi-person me-1"></i>
                                <span th:text="${course.instructorName}">Instructor</span>
                            </small>
                            <a th:href="@{/app/courses/{id}(id=${course.id})}" class="btn btn-sm btn-primary">
                                View course
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
