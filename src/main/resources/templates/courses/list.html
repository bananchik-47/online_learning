<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Course catalog</title>
</head>
<body>
<div layout:fragment="content">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
            <li class="breadcrumb-item active" aria-current="page">Courses</li>
        </ol>
    </nav>

    <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-2 mb-4">
        <h1 class="h3 mb-0">
            <i class="bi bi-journal-richtext me-2"></i>Course catalog
        </h1>
        <span class="badge text-bg-secondary" th:text="${courses.totalElements} + ' courses'">0 courses</span>
    </div>

    <div th:if="${courses.isEmpty()}" class="alert alert-info">
        <i class="bi bi-info-circle me-1"></i>No published courses available yet.
    </div>

    <div class="row g-4" th:if="${!courses.isEmpty()}">
        <div class="col-md-6 col-lg-4" th:each="course : ${courses.content}">
            <div class="card h-100 shadow-sm">
                <div class="card-body d-flex flex-column">
                    <h2 class="h5 card-title" th:text="${course.title}">Course title</h2>
                    <p class="card-text text-muted flex-grow-1" th:text="${course.description}">Description</p>
                    <div class="mt-3">
                        <small class="text-muted d-block mb-2">
                            <i class="bi bi-person me-1"></i>
                            <span th:text="${course.instructorName}">Instructor</span>
                        </small>
                        <a th:href="@{/app/courses/{id}(id=${course.id})}" class="btn btn-primary w-100">
                            <i class="bi bi-arrow-right-circle me-1"></i>Open course
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/pagination :: pagination(${courses})}"></div>
</div>
</body>
</html>
