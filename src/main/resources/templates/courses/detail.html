<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="${course.title}">Course</title>
</head>
<body>
<div layout:fragment="content">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
            <li class="breadcrumb-item"><a th:href="@{/app/courses}">Courses</a></li>
            <li class="breadcrumb-item active" aria-current="page" th:text="${course.title}">Course</li>
        </ol>
    </nav>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                <div>
                    <h1 class="h3 mb-2" th:text="${course.title}">Course title</h1>
                    <p class="text-muted mb-0">
                        <i class="bi bi-person me-1"></i>
                        <span th:text="${course.instructorName}">Instructor</span>
                    </p>
                </div>
                <span class="badge text-bg-success" th:if="${course.isPublished}">Published</span>
            </div>
            <hr>
            <p class="mb-0" th:text="${course.description}">Course description</p>
        </div>
    </div>

    <h2 class="h5 mb-3">
        <i class="bi bi-collection me-1"></i>Modules
    </h2>

    <div th:if="${course.modules == null or course.modules.isEmpty()}" class="alert alert-info">
        <i class="bi bi-info-circle me-1"></i>This course has no modules yet.
    </div>

    <div class="row g-3" th:if="${course.modules != null and !course.modules.isEmpty()}">
        <div class="col-md-6" th:each="module : ${course.modules}">
            <div class="card h-100">
                <div class="card-body d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h3 class="h6 card-title mb-0" th:text="${module.title}">Module title</h3>
                        <span class="badge text-bg-light text-dark" th:text="'#' + ${module.orderIndex}">#1</span>
                    </div>
                    <p class="card-text text-muted small flex-grow-1" th:text="${module.description}">Description</p>
                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <small class="text-muted">
                            <i class="bi bi-book me-1"></i>
                            <span th:text="${module.lessons != null ? module.lessons.size() : 0} + ' lessons'">0 lessons</span>
                        </small>
                        <a th:href="@{/app/modules/{id}(id=${module.id})}" class="btn btn-sm btn-outline-primary">
                            Open module
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
